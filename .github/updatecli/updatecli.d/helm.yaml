name: "Update Helm CLI in Workflow"
pipelineid: "helm_v3_update"

sources:
  latestHelm:
    name: "Get latest Helm v3"
    kind: "githubrelease"
    spec:
      owner: "helm"
      repository: "helm"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: "semver"
        pattern: "^3"
    transformers:
      - trimprefix: "v"

  helmSHA:
    name: "Get Helm SHA256"
    kind: "shell"
    spec:
      # Direct link to the sha256 file Helm provides for each release
      command: 'curl -sL https://get.helm.sh/helm-v{{ source "latestHelm" }}-linux-amd64.tar.gz.sha256'
    dependson:
      - latestHelm

targets:
  updateVersion:
    name: "Update HELM_VERSION"
    kind: "file"
    sourceid: latestHelm
    spec:
      file: ".github/workflows/master-e2e.yaml"
      # Regex: find the line starting with HELM_VERSION= and capture the value
      matchpattern: 'HELM_VERSION=".*"'
      replacepattern: 'HELM_VERSION="{{ source "latestHelm" }}"'

  updateSHA:
    name: "Update HELM_SHA256"
    kind: "file"
    sourceid: helmSHA
    spec:
      file: ".github/workflows/master-e2e.yaml"
      matchpattern: 'HELM_SHA256=".*"'
      replacepattern: 'HELM_SHA256="{{ source "helmSHA" }}"'
